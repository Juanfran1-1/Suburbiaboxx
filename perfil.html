<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio | Mi Perfil</title>
    <link rel="stylesheet" href="global/panel_global.css">
    <link rel="stylesheet" href="pages/configuracion/configuracion.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
</head>
<body class="panel-page">

    <div class="panel-wrapper">
        <div class="perfil-pc-container">
            
            <div class="card-mini-logo">
                <img src="assets/logo-suburbia.jpg" alt="Logo">
            </div>

            <div class="perfil-grid-horizontal">
                
                <aside class="perfil-sidebar">
                    <h2 class="titulo-seccion">FICHA DEL SOCIO</h2>
                    <div class="foto-principal">
                        <img src="assets/mayweather.jpg" alt="Socio">
                        <button class="btn-change">CAMBIAR FOTO</button>
                    </div>
                    <div class="badge-box">
                        <span class="etiqueta">EXPERIENCIA:</span>
                        <p class="valor">Más de 4 años</p>
                    </div>
                </aside>

                <section class="perfil-main-content">
                    <div class="header-datos">
                        <h3>DATOS DE REGISTRO</h3>
                        <div class="linea-roja"></div>
                    </div>

                    <div class="datos-grid">
                        <div class="campo-largo">
                            <label>NOMBRE Y APELLIDO</label>
                            <input type="text" value="JUAN FRANCISCO UCEDA COLOMBO" readonly>
                        </div>
                        <div class="campo">
                            <label>DNI</label>
                            <input type="text" value="12.345.678" readonly>
                        </div>
                        <div class="campo">
                            <label>EMAIL</label>
                            <input type="email" value="juanperez@mail.com">
                        </div>
                        <div class="campo">
                            <label>FECHA DE NACIMIENTO</label>
                            <input type="text" value="15/05/1990" readonly>
                        </div>
                        <div class="campo">
                            <label>TELÉFONO</label>
                            <input type="text" value="11 1234 5678">
                        </div>
                        <div class="campo">
                            <label>OBRA SOCIAL</label>
                            <input type="text" value="IOMA">
                        </div>
                        <div class="campo-mitad">
                            <label>PESO (KG)</label>
                            <input type="number" value="85">
                        </div>
                        <div class="campo-mitad">
                            <label>ALTURA (CM)</label>
                            <input type="number" value="180">
                        </div>
                    </div>

                    <div class="perfil-actions">
                        <button class="btn-save">ACTUALIZAR DATOS</button>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="global/panel_global.js"></script>
</body>
</html>
