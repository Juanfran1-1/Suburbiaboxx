<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio | Panel de Pagos</title>
    <link rel="stylesheet" href="global/panel_global.css">
    <link rel="stylesheet" href="pages/pagos/pagos.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
</head>
<body class="panel-page">

    <div class="panel-wrapper">
        <div class="dashboard-container">
            
            <div class="card-mini-logo">
                <img src="assets/logo-suburbia.jpg" alt="Logo">
            </div>

            <header class="pagos-header">
                <h2 class="titulo-seccion">GESTIÓN DE PAGOS</h2>
            </header>

            <div class="main-grid">
                <aside class="sidebar-pago">
                    <div class="status-card">
                        <div class="label-box">ESTADO ACTUAL</div>
                        <div class="info-main">
                            <p class="plan-tipo">PLAN PREMIUM</p>
                            <p class="estado-alerta">CUOTA VENCIDA</p>
                        </div>
                        <div class="monto-grande">$10.000</div>
                        <button class="btn-pagar-box">PAGAR AHORA</button>
                    </div>

                </aside>

                <section class="content-historial">
                    <div class="tabla-wrapper">
                        <div class="box-header">HISTORIAL COMPLETO DE TRANSACCIONES</div>
                        <table class="tabla-pc">
                            <thead>
                                <tr>
                                    <th>FECHA DE PAGO</th>
                                    <th>CONCEPTO / MES</th>
                                    <th>MONTO</th>
                                    <th>MÉTODO</th>
                                    <th>ESTADO</th>
                                    <th>COMPROBANTE</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>05/03/2026</td>
                                    <td>Marzo 2026</td>
                                    <td>$10.000</td>
                                    <td>Mercado Pago</td>
                                    <td><span class="badge-ok">PAGADO</span></td>
                                    <td><button class="btn-download">DESCARGAR PDF</button></td>
                                </tr>
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="global/panel_global.js"></script>
</body>
</html>
