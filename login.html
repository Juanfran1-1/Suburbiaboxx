<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Socios | Suburbia Boxx</title>
    <link rel="stylesheet" href="pages/login/login.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <a href="index.html">
                <img src="assets/logo-suburbia.jpg" alt="Suburbia Boxx" class="mini-logo">
            </a>
            <h1>Iniciar Sesión</h1>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="user">EMAIL O DNI</label>
                <input type="text" id="user" placeholder="nombre@ejemplo.com" >
            </div>

            <div class="input-group">
                <label for="pass">CONTRASEÑA</label>
                <input type="password" id="pass" placeholder="••••••••" >
            </div>

            <div class="form-options">
                <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">INGRESAR AL RING</button>
        </form>

        <div class="login-footer">
            <p>¿Todavía no sos parte? <a href="registro.html">Registrate aquí</a></p>
        </div>
    </div>
    <script src="pages/login/login.js"></script>
</body>
</html>
