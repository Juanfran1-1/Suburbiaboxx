<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Socios | Suburbia Boxx</title>
    <link rel="stylesheet" href="global/global.css"> 
    <link rel="stylesheet" href="pages/login/login.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <a href="index.html" class="back-home-btn">
        <span class="arrow-icon">←</span>
        <span class="back-text">VOLVER</span>
    </a>
    
    <main class="login-main-container">
        <div class="login-card fade-in"> <div class="login-header">
                <h1>Iniciar Sesión</h1>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="user">EMAIL O DNI</label>
                    <input type="text" id="user" name="username" placeholder="nombre@ejemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="pass">CONTRASEÑA</label>
                    <input type="password" id="pass" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <a href="#" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-submit">INGRESAR AL RING</button>
            </form>

            <div class="login-footer">
                <p>¿Todavía no sos parte? <a href="registro.html">Registrate aquí</a></p>
            </div>
        </div>
    </main>

    <script src="pages/login/login.js"></script>
</body>
</html>
