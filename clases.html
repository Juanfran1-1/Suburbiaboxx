<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Clases | Suburbia Box</title>
    <link rel="stylesheet" href="panel_global.css">
    <link rel="stylesheet" href="pages/clases/clases.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
</head>
<body class="panel-page">

    <div class="panel-wrapper">
        <div class="main-card clases-container">
            
            <div class="card-mini-logo">
                <img src="assets/logo-suburbia.jpg" alt="Logo">
            </div>

            <h2 class="titulo-seccion">MIS CLASES</h2>

            <div class="days-tabs">
                <button class="tab-btn active">LUN</button>
                <button class="tab-btn">MAR</button>
                <button class="tab-btn">MIE</button>
                <button class="tab-btn">JUE</button>
                <button class="tab-btn">VIE</button>
                <button class="tab-btn">SAB</button>
                <button class="tab-btn">DOM</button>
            </div>

            <div class="clases-viewport">
                
                <div class="clase-row">
                    <div class="clase-detalles">
                        <p><span>CLASE:</span> RECREATIVO</p>
                        <p><span>PROFESOR:</span> TYSON FURY</p>
                        <p><span>HORARIO:</span> 18:00 HS</p>
                    </div>
                    <div class="clase-registro">
                        <p class="cupos-text">CUPOS: 15 / 20</p>
                        <button class="btn-asistir">ASISTIR</button>
                    </div>
                </div>

                <div class="clase-row">
                    <div class="clase-detalles">
                        <p><span>CLASE:</span> COMPETITIVO</p>
                        <p><span>PROFESOR:</span> CANELO ALVAREZ</p>
                        <p><span>HORARIO:</span> 20:00 HS</p>
                    </div>
                    <div class="clase-registro">
                        <p class="cupos-text">CUPOS: 08 / 20</p>
                        <button class="btn-asistir">ASISTIR</button>
                    </div>
                </div>

            </div>


        </div>
    </div>

    <script src="panel_global.js"></script>
</body>
</html>
