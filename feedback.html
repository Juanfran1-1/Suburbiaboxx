<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio | Mi Progreso</title>
    <link rel="stylesheet" href="global/panel_global.css">
    <link rel="stylesheet" href="pages/feedback/feedback.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
</head>
<body class="panel-page">

    <div class="panel-wrapper">
        <div class="dashboard-container">
            
            <div class="perfil-mini-logo">
                <img src="../../assets/logo-suburbia.jpg" alt="Logo Suburbia">
            </div>

            <h2 class="titulo-seccion">MI PROGRESO</h2>

            <div class="progreso-layout-pc">
                
                <aside class="col-stats">
                    <div class="progreso-card">
                        <label>PESO ACTUAL</label>
                        <div class="dato-principal">85.5 <span>KG</span></div>
                    </div>

                    <div class="progreso-card">
                        <label>LICENCIA FAB</label>
                        <div class="status-licencia activa">ACTIVA</div>
                    </div>
                </aside>

                <section class="col-pizarro">
                    <div class="pizarro-header">
                        <label>INDICACIONES DEL ENTRENADOR</label>
                        <span class="fecha-actual">ACTUALIZADO: 31/03/2026</span>
                    </div>
                    <div class="pizarro-content">
                        <div class="nota-coach-container">
                            <p class="texto-coach">
                                "Enfocarse en la guardia alta durante los desplazamientos laterales. 
                                Mantener la distancia con el jab y no bajar la mano derecha al lanzar el gancho. 
                                Buen ritmo aeróbico, seguir así."
                            </p>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>
    <script src="global/panel_global.js"></script>
</body>
</html>
