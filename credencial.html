<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio | Suburbia Boxx</title>
    
    <link rel="stylesheet" href="global/panel_global.css">
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="pages/credencial/credencial.css">
</head>
<body class="panel-page">
    
    <div class="panel-wrapper">
        <div class="main-card inicio-grid">
            

            <div class="card-mini-logo">
                <img src="assets/logo-suburbia.jpg" alt="Logo">
            </div>

            <div class="col-profile">
                <div class="photo-box">
                    <img src="assets/mayweather.jpg" alt="Socio" id="userPhoto">
                </div>
                <h2 id="userName">JUAN FRANCISCO UCEDA COLOMBO</h2>
            </div>

            <div class="col-data">
                <div class="data-box">
                    <label>DNI</label>
                    <span id="userDni">12.345.678</span>
                </div>
                <div class="data-box">
                    <label>N° SOCIO</label>
                    <span id="userNum">#0042</span>
                </div>
                <div class="data-box">
                    <label>ESTADO</label>
                    <span id="userStatus">ACTIVO</span>
                </div>
                <div class="data-box vcto">
                    <label>VCTO CUOTA</label>
                    <span id="userVcto">31/03</span>
                </div>
            </div>

            <div class="col-actions">
                <button class="btn-panel">MIS CLASES</button>
                <button class="btn-panel">PAGAR CUOTA</button>
                <button class="btn-panel btn-logout">CERRAR SESIÓN</button>
            </div>

        </div>
    </div>

    <script src="global/panel_global.js"></script>
</body>
</html>
